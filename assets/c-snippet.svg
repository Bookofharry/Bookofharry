<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3C5E"/>
      <stop offset="100%" stop-color="#0F2233"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="620" height="380" rx="14" fill="url(#bgGrad2)" filter="url(#shadow2)"/>

  <!-- title bar -->
  <rect x="10" y="10" width="620" height="36" rx="14" fill="#0F2233"/>
  <rect x="10" y="32" width="620" height="14" fill="#0F2233"/>
  <circle cx="32" cy="28" r="6" fill="#FF5F56"/>
  <circle cx="52" cy="28" r="6" fill="#FFBD2E"/>
  <circle cx="72" cy="28" r="6" fill="#27C93F"/>
  <text x="320" y="33" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7FA8C9">alive.c</text>

  <!-- code lines -->
  <g font-family="Fira Code, Menlo, Consolas, monospace" font-size="15">
    <text x="32" y="76"><tspan fill="#c586c0">#include</tspan><tspan fill="#e6edf3"> </tspan><tspan fill="#1D9E75">&lt;stdio.h&gt;</tspan></text>
    <text x="32" y="100"><tspan fill="#c586c0">#include</tspan><tspan fill="#e6edf3"> </tspan><tspan fill="#1D9E75">&lt;stdbool.h&gt;</tspan></text>

    <text x="32" y="148"><tspan fill="#4EC9B0">int</tspan><tspan fill="#e6edf3"> </tspan><tspan fill="#DCDCAA">main</tspan><tspan fill="#e6edf3">() {</tspan></text>
    <text x="56" y="172"><tspan fill="#4EC9B0">bool</tspan><tspan fill="#e6edf3"> alive = </tspan><tspan fill="#569CD6">true</tspan><tspan fill="#e6edf3">;</tspan></text>
    <text x="56" y="196"><tspan fill="#c586c0">while</tspan><tspan fill="#e6edf3"> (alive) {</tspan></text>
    <text x="80" y="220"><tspan fill="#DCDCAA">printf</tspan><tspan fill="#e6edf3">(</tspan><tspan fill="#1D9E75">"coding...💻\n"</tspan><tspan fill="#e6edf3">);</tspan></text>
    <text x="80" y="244"><tspan fill="#6A9955">// sleep, learn, repeat</tspan></text>
    <text x="56" y="268"><tspan fill="#e6edf3">}</tspan></text>

    <text x="56" y="300"><tspan fill="#6A9955">// CODE TILL I DIE 🔥</tspan></text>
    <text x="56" y="324"><tspan fill="#c586c0">return</tspan><tspan fill="#e6edf3"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e6edf3">;</tspan></text>
    <text x="32" y="348"><tspan fill="#e6edf3">}</tspan></text>
  </g>

  <!-- blinking cursor -->
  <rect x="46" y="336" width="9" height="16" fill="#2E6DA4">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
