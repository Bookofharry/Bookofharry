<svg width="640" height="180" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3C5E"/>
      <stop offset="100%" stop-color="#12283f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="10" y="10" width="620" height="160" rx="14" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect x="10" y="10" width="620" height="36" rx="14" fill="#0F2233"/>
  <rect x="10" y="32" width="620" height="14" fill="#0F2233"/>
  <circle cx="32" cy="28" r="6" fill="#FF5F56"/>
  <circle cx="52" cy="28" r="6" fill="#FFBD2E"/>
  <circle cx="72" cy="28" r="6" fill="#27C93F"/>
  <text x="320" y="33" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7FA8C9">contact.sh</text>
  <text x="32" y="86" font-family="Fira Code, Menlo, Consolas, monospace" font-size="16">
    <tspan fill="#7FA8C9">email</tspan><tspan fill="#e6edf3">=</tspan><tspan fill="#1D9E75">"bookofharry.dev@gmail.com"</tspan>
  </text>
  <text x="32" y="118" font-family="Fira Code, Menlo, Consolas, monospace" font-size="16">
    <tspan fill="#c586c0">echo</tspan><tspan fill="#e6edf3"> </tspan><tspan fill="#1D9E75">"Send me a mail at: </tspan><tspan fill="#7FA8C9">$email</tspan><tspan fill="#1D9E75">"</tspan>
  </text>
  <rect x="32" y="128" width="9" height="16" fill="#2E6DA4">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
